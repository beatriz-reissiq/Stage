<!DOCTYPE html>
<html lang="en">
<head>

    <title>Login</title>
    <link rel="stylesheet" href="./css/login.css">
</head>
<body>

  <main>
    <div class="container-ilustracao">
        <button class="voltar"> <a href="./home.html">⟵ Voltar</a></button>

        <button onclick="cadastrar()">Login</button>

    </div>
