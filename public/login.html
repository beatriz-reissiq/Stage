<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./css/login.css">
</head>
<body>

  <main>
    <div class="container-ilustracao">
        <button class="voltar"> <a href="./index.html">⟵ Voltar</a></button>
        <div class="fraseEfeito">Seja bem-vindo(a) de volta!</div>
        <div class="subtexto">Realize o seu acesso nos campos ao lado para acessar o nosso site!</div>
        <div class="ilustracao"><img src="./assets/img/mulher-cantando.png" alt=""></div>
    </div>

    <div class="container-forms">
        <div class="tituloForms">Faça o seu login</div>
        <input placeholder="Email" type="text" id="ipt_email"> <br>
        <input placeholder="Senha" type="password" id="ipt_senha" > <br>

        <button onclick="autenticar()">Login</button>
        <small>Ainda não tem um cadastro? <a href="./cadastro.html">Cadastre-se</small> </a>
       
    </div>
  </main>
</body>
</html>
<script>
function autenticar() {

    var emailVar = ipt_email.value;
    var senhaVar = ipt_senha.value;

    if (emailVar == "" || senhaVar == "") {
        alert("Preencha todos os campos!");
        return false;
    }

    fetch("/usuarios/autenticar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            emailServer: emailVar,
            senhaServer: senhaVar
        })
    })
    .then(res => {
        if (!res.ok) throw "Erro no login";
        return res.json();
    })
    .then(data => {


        sessionStorage.ID_USUARIO = data.id;
        sessionStorage.NOME_USUARIO = data.nome;

        alert("Bem-vindo, " + data.nome + "!");

        window.location = "index.html";
    })
    .catch(err => {
        console.log(err);
        alert("Email ou senha inválidos!");
    });

    return false;
}
</script>
